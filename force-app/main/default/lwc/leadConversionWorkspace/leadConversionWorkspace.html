<template>
    <lightning-quick-action-panel header="리드 전환 워크스페이스">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="리드 전환 정보를 불러오는 중입니다."></lightning-spinner>
        </template>

        <template if:true={errorMessage}>
            <div class="error-state">{errorMessage}</div>
        </template>

        <template if:true={workspace}>
            <div class="shell">
                <section class="hero">
                    <div>
                        <p class="eyebrow">Lead Conversion</p>
                        <h2 class="hero-title">{leadTitle}</h2>
                        <p class="hero-meta">{leadSubtitle}</p>
                    </div>
                    <div class="hero-pills">
                        <span class={priorityPillClass}>{priorityLabel}</span>
                        <template if:true={showLeadScore}>
                            <span class="pill score">{leadScoreLabel}</span>
                        </template>
                    </div>
                </section>

                <section class="cards-grid">
                    <template for:each={summaryCards} for:item="card">
                        <article key={card.key} class="summary-card">
                            <p class="card-label">{card.label}</p>
                            <p class="card-value">{card.value}</p>
                        </article>
                    </template>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <div>
                            <p class="eyebrow">Sales Snapshot</p>
                            <h3 class="panel-title">영업 액션 요약</h3>
                        </div>
                    </div>
                    <p class="detail-text">{salesActionSummary}</p>
                </section>

                <template if:true={workspace.lead.isConverted}>
                    <section class="panel">
                        <div class="panel-header">
                            <div>
                                <p class="eyebrow">Already Converted</p>
                                <h3 class="panel-title">이미 전환된 리드입니다</h3>
                            </div>
                        </div>
                        <div class="link-grid">
                            <template for:each={convertedLinks} for:item="item">
                                <article key={item.key} class="link-card">
                                    <p class="card-label">{item.label}</p>
                                    <lightning-formatted-url
                                        value={item.url}
                                        label={item.actionLabel}
                                        target="_blank"
                                    ></lightning-formatted-url>
                                </article>
                            </template>
                        </div>
                    </section>
                </template>

                <template if:false={workspace.lead.isConverted}>
                    <section class="panel">
                        <div class="panel-header">
                            <div>
                                <p class="eyebrow">Conversion Setup</p>
                                <h3 class="panel-title">전환 설정</h3>
                            </div>
                        </div>
                        <div class="form-grid">
                            <lightning-combobox
                                label="전환 완료 상태"
                                value={convertedStatus}
                                options={statusOptions}
                                onchange={handleConvertedStatusChange}
                            ></lightning-combobox>
                            <lightning-input
                                type="toggle"
                                label="기회 생성"
                                checked={createOpportunity}
                                onchange={handleCreateOpportunityChange}
                            ></lightning-input>
                            <template if:true={createOpportunity}>
                                <div class="full-width">
                                    <lightning-input
                                        label="기회 이름"
                                        value={opportunityName}
                                        onchange={handleOpportunityNameChange}
                                        maxlength="120"
                                    ></lightning-input>
                                </div>
                            </template>
                        </div>
                    </section>

                    <section class="panel">
                        <div class="panel-header">
                            <div>
                                <p class="eyebrow">Account Decision</p>
                                <h3 class="panel-title">거래처 연결 방식</h3>
                            </div>
                        </div>
                        <lightning-radio-group
                            type="button"
                            label="거래처 선택"
                            options={accountModeOptions}
                            value={accountMode}
                            onchange={handleAccountModeChange}
                        ></lightning-radio-group>
                        <div class="form-grid">
                            <template if:true={isExistingAccountMode}>
                                <div class="full-width">
                                    <lightning-combobox
                                        label="기존 거래처"
                                        value={selectedAccountId}
                                        options={accountOptions}
                                        onchange={handleAccountSelectionChange}
                                    ></lightning-combobox>
                                    <template if:true={selectedAccountHelpText}>
                                        <p class="help-text">{selectedAccountHelpText}</p>
                                    </template>
                                </div>
                            </template>
                            <template if:false={isExistingAccountMode}>
                                <div class="full-width">
                                    <lightning-input
                                        label="신규 거래처 이름"
                                        value={newAccountName}
                                        onchange={handleNewAccountNameChange}
                                        maxlength="255"
                                    ></lightning-input>
                                    <p class="help-text">
                                        리드 회사명을 기본값으로 두고 필요하면 수정해서 새 거래처를
                                        생성합니다.
                                    </p>
                                </div>
                            </template>
                        </div>
                    </section>

                    <section class="panel">
                        <div class="panel-header">
                            <div>
                                <p class="eyebrow">Contact Decision</p>
                                <h3 class="panel-title">연락처 연결 방식</h3>
                            </div>
                        </div>
                        <lightning-radio-group
                            type="button"
                            label="연락처 선택"
                            options={contactModeOptions}
                            value={contactMode}
                            onchange={handleContactModeChange}
                        ></lightning-radio-group>
                        <div class="form-grid">
                            <template if:true={isExistingContactMode}>
                                <div class="full-width">
                                    <lightning-combobox
                                        label="기존 연락처"
                                        value={selectedContactId}
                                        options={contactOptions}
                                        onchange={handleContactSelectionChange}
                                    ></lightning-combobox>
                                    <template if:true={selectedContactHelpText}>
                                        <p class="help-text">{selectedContactHelpText}</p>
                                    </template>
                                </div>
                            </template>
                            <template if:false={isExistingContactMode}>
                                <p class="help-text full-width">
                                    새 연락처는 현재 리드의 이름, 이메일, 전화번호 정보를 기준으로
                                    자동 생성됩니다.
                                </p>
                            </template>
                        </div>
                    </section>
                </template>
            </div>
        </template>

        <div slot="footer" class="footer-actions">
            <lightning-button
                label={cancelButtonLabel}
                onclick={handleCancel}
                disabled={actionInProgress}
            ></lightning-button>
            <lightning-button
                label="새로고침"
                onclick={handleRefresh}
                disabled={isBusy}
            ></lightning-button>
            <template if:true={showConvertAction}>
                <lightning-button
                    label="리드 전환"
                    variant="brand"
                    onclick={handleConvert}
                    disabled={disableConvert}
                ></lightning-button>
            </template>
        </div>
    </lightning-quick-action-panel>
</template>
