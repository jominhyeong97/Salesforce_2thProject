<template>
    <lightning-quick-action-panel header="Aqua 견적서 생성">
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-p-vertical_x-large">
                    <lightning-spinner alternative-text="견적 정보 로딩 중"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    표준 Quote 데이터를 그대로 사용하면서 고객에게 전달되는 PDF만 Aqua 브랜딩 문서로 생성합니다.
                </p>

                <div class="slds-box slds-theme_default slds-m-bottom_medium">
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">견적명</p>
                            <p class="slds-text-heading_small">{quoteName}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">거래처</p>
                            <p>{accountName}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">영업 상태</p>
                            <p>{statusLabel}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">제안 시나리오</p>
                            <p>{proposalScenario}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">만료일</p>
                            <lightning-formatted-date-time
                                value={expirationDate}
                                year="numeric"
                                month="2-digit"
                                day="2-digit">
                            </lightning-formatted-date-time>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">현재 PDF 건수</p>
                            <p>{existingPdfCount}건</p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="slds-text-title_caps slds-m-bottom_x-small">최종 제안 금액</p>
                            <lightning-formatted-number
                                value={grandTotal}
                                format-style="currency"
                                currency-code="KRW">
                            </lightning-formatted-number>
                        </div>
                    </div>
                </div>

            </template>
        </div>

        <div slot="footer">
            <lightning-button
                label="닫기"
                onclick={handleClose}
                disabled={isGenerating}>
            </lightning-button>
            <lightning-button
                class="slds-m-left_small"
                variant="brand"
                label={generateButtonLabel}
                onclick={handleGenerate}
                disabled={disableGenerate}>
            </lightning-button>
        </div>
    </lightning-quick-action-panel>
</template>
