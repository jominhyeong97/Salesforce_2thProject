<template>
    <lightning-card title="Task 관리" icon-name="standard:task2">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Task 관리 데이터를 불러오는 중입니다."></lightning-spinner>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium slds-text-color_error">
                {errorMessage}
            </div>
        </template>

        <template if:true={data}>
            <div class="slds-p-horizontal_medium slds-p-top_small">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <template for:each={metrics} for:item="metric">
                        <div key={metric.label} class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <div class="slds-box slds-theme_default">
                                <p class="slds-text-title_caps">{metric.label}</p>
                                <p class="slds-text-heading_medium slds-m-top_x-small">{metric.value}</p>
                                <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                                    {metric.helperText}
                                </p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="slds-p-around_medium">
                <lightning-tabset>
                    <lightning-tab label="7일 이내 미완료 Task">
                        <template if:true={hasSlaTasks}>
                            <lightning-datatable
                                key-field="id"
                                data={slaTasks}
                                columns={taskColumns}
                                hide-checkbox-column
                            ></lightning-datatable>
                        </template>
                        <template if:false={hasSlaTasks}>
                            <div class="slds-p-vertical_medium slds-text-color_weak">
                                7일 이내 마감되는 미완료 Task가 없습니다.
                            </div>
                        </template>
                    </lightning-tab>

                    <lightning-tab label="재공략 예정">
                        <template if:true={hasReengagementTasks}>
                            <lightning-datatable
                                key-field="id"
                                data={reengagementTasks}
                                columns={taskColumns}
                                hide-checkbox-column
                            ></lightning-datatable>
                        </template>
                        <template if:false={hasReengagementTasks}>
                            <div class="slds-p-vertical_medium slds-text-color_weak">
                                예정된 재공략 Task가 없습니다.
                            </div>
                        </template>
                    </lightning-tab>
                </lightning-tabset>
            </div>
        </template>
    </lightning-card>
</template>
